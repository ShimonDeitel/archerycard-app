name: Archerycard
options:
  bundleIdPrefix: com.shimondeitel.archerycard
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Archerycard:
    type: application
    platform: iOS
    sources:
      - path: Archerycard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.archerycard
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Archerycard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ArcherycardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ArcherycardTests
      - path: Archerycard.storekit
    dependencies:
      - target: Archerycard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.archerycard.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ArcherycardUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ArcherycardUITests
    dependencies:
      - target: Archerycard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.archerycard.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Archerycard:
    build:
      targets:
        Archerycard: all
        ArcherycardTests: [test]
        ArcherycardUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Archerycard.storekit
    test:
      config: Debug
      storeKitConfiguration: Archerycard.storekit
      targets:
        - ArcherycardTests
        - ArcherycardUITests
    archive:
      config: Release
